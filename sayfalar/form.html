<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Yüzük Taşıyıcısı Formu</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <h1>Yüzük Taşıyıcısı Aday Formu</h1>

  <form action="form_sonuc.html" method="get">
    <label for="isim">İsminiz:</label><br>
    <input type="text" id="isim" name="isim" required><br><br>

    <label for="email">E-posta:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="gorev">Kendinizi tanıtın:</label><br>
    <textarea id="gorev" name="gorev" rows="4" required></textarea><br><br>

    <input type="submit" value="Gönder">
  </form>

  <br>
  <a href="../index.html">Anasayfaya Dön</a>

</body>
</html>
